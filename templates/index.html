<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Converter</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 30px;
        }
        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .field {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .field label {
            font-size: 14px;
            margin-bottom: 6px;
            color: #aaa;
        }
        input, select {
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
        }
        button {
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            background-color: #2563eb;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #result {
            margin-top: 20px;
            font-size: 28px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Currency Converter</h1>
    <div class="row">
        <div class="field">
            <label>Amount</label>
            <input type="number" id="amount" value="1" min="0" step="any">
        </div>
        <div class="field">
            <label>From</label>
            <select id="from">
                <option value="GBP">GBP</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="JPY">JPY</option>
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="PLN">PLN</option>
            </select>
        </div>
        <div class="field">
            <label>To</label>
            <select id="to">
                <option value="USD">USD</option>
                <option value="GBP">GBP</option>
                <option value="EUR">EUR</option>
                <option value="JPY">JPY</option>
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="PLN">PLN</option>
            </select>
        </div>
        <button onclick="convertCurrency()">Convert</button>
    </div>
    <div id="result"></div>

    <script>
        function convertCurrency() {
            const amount = document.getElementById('amount').value;
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "Loading...";

            fetch(`/convert?amount=${amount}&from=${from}&to=${to}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        resultDiv.innerHTML = "Conversion not available.";
                        return;
                    }
                    resultDiv.innerHTML = `${data.amount} ${data.from} = ${data.converted} ${data.to}`;
                });
        }
    </script>
</body>
</html>
